; PlatformIO build for the NodeSentry ESP8266 sensor firmware.
;
;   pio run                  -> compile
;   pio run -t upload        -> flash over USB
;   pio device monitor       -> serial console (115200)
;
; Arduino IDE users: install the "ESP8266" boards package and the
; "PubSubClient" library, select board "LOLIN(WEMOS) D1 mini Pro", open
; firmware.ino, and flash. (The .ino is self-contained - platformio.ini is optional.)

[platformio]
src_dir = .

[env:d1_mini_pro]
platform      = espressif8266
board         = d1_mini_pro
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient@^2.8

; PubSubClient's compile-time cap; the firmware also calls setBufferSize(512)
; at runtime. Both are set so evil_twin payloads (two BSSIDs + SSID) never truncate.
build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
