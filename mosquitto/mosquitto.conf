listener 1883

# SECURITY: anonymous publish is enabled so sensor nodes can connect with no
# credentials (zero-config). Anyone who can reach this port can publish to
# nodes/# and inject alerts. The backend validates and bounds every payload, so
# this cannot reach the dashboard as XSS, but it can still spoof/poison alerts.
# On an untrusted network, lock the broker down:
#
#   1. allow_anonymous false
#   2. password_file /mosquitto/config/passwd   (mosquitto_passwd -c passwd node1)
#   3. per-node ACLs (publish-only on nodes/<id>/#) and TLS on listener 8883
# and provision each node with MQTT credentials.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout