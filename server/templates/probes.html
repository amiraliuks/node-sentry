{% extends "base.html" %}

{% block content %}
  <div class="filter-bar">
    <input type="text" class="search-input" id="search-input" placeholder="Search MAC, SSID, node...">
    <select class="filter-select" id="node-filter">
      <option value="">All nodes</option>
    </select>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div class="card">
    <div class="card-header">Probe Request Log</div>
    <table class="alert-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Node</th>
          <th>MAC</th>
          <th>Hunting for SSID</th>
          <th>RSSI</th>
        </tr>
      </thead>
      <tbody id="probe-body">
        <tr class="empty-row"><td colspan="5">No probe requests logged yet.</td></tr>
      </tbody>
    </table>
  </div>
{% endblock %}

{% block scripts %}
  <script src="/static/js/shared.js"></script>
  <script src="/static/js/probes.js"></script>
{% endblock %}
