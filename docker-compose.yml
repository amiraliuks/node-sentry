services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nodesentry-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    networks:
      - nodesentry

  app:
    build: .
    container_name: nodesentry-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    env_file:
      - .env
    volumes:
      - ./server/nodesentry.db:/app/server/nodesentry.db
      - ./config.json:/app/config.json
    depends_on:
      - mosquitto
    networks:
      - nodesentry

volumes:
  mosquitto-data:

networks:
  nodesentry:
    driver: bridge